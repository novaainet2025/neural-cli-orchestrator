name: Obsidian Vault Cleanup

on:
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/checkout@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Note Generator
        run: npm run obsidian:generate
        env:
          DATABASE_PATH: db/nco.db

      - name: Run Vault Cleaner
        run: npm run obsidian:clean

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add obsidian_vault/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(obsidian): weekly vault cleanup and note sync [skip ci]" && git push)
